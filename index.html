<!DOCTYPE html>
<html lang="ko">

<head>
	<!-- Google tag (gtag.js) -->
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-N9G6MDFVRD"></script>
	<script>
		window.dataLayer = window.dataLayer || [];
		function gtag() { dataLayer.push(arguments); }
		gtag('js', new Date());
		gtag('config', 'G-N9G6MDFVRD');
	</script>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Global Market Monitor</title>

	<!-- ★ PWA 웹앱 및 파비콘 연동 -->
	<link rel="manifest" href="manifest.json">
	<link rel="icon" href="./images/icon-180.png" type="image/png">
	<link rel="apple-touch-icon" href="./images/icon-180.png">
	<meta name="theme-color" content="#1e293b">

	<!-- 스타일 시트 & 폰트 -->
	<link rel="stylesheet" href="./style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
	<div class="container">
		<header>
			<div class="header-left">
				<div class="header-title-group">
					<i class="fa-solid fa-chart-line"></i>
					<h1>글로벌 마켓 모니터</h1>
				</div>
				<div id="timeBox" class="time-info" onclick="toggleTooltip(event, this)">
					<i class="fa-regular fa-clock"></i>
					<span id="updateTime">불러오는 중...</span>
					<i class="fa-solid fa-circle-info delay-icon"></i>
					<div class="custom-tooltip">야후 파이낸스 제공 정책상 지수/선물은 10~15분 지연 시세입니다.</div>
				</div>
			</div>
			<div class="header-right">
				<button id="refreshBtn" class="refresh-btn" onclick="loadData()">
					<i id="refreshIcon" class="fa-solid fa-rotate-right"></i>
					<span>새로고침</span>
				</button>
			</div>
		</header>

		<div id="dashboard" class="grid">
			<div class="loading-container">
				<i class="fa-solid fa-circle-notch fa-spin loading-spinner"></i>
				<p>실시간 시장 데이터를 불러오고 있습니다...</p>
			</div>
		</div>
	</div>

	<script>
		// ★ 새로 배포한 구글 앱스 스크립트 웹앱 URL로 변경하세요!
		const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyV4J5VZ_Og5vbQxpoqinTn4UXce3o4Dig9cbR-Yam4IewdfMz3snXAmdjLUPWP2KLe7g/exec";
		const FETCH_TIMEOUT_MS = 10000;

		window.onload = function () {
			loadData();
			document.addEventListener('click', function (e) {
				if (!e.target.closest('.tooltip-wrapper') && !e.target.closest('.time-info')) {
					document.querySelectorAll('.tooltip-wrapper.active, .time-info.active').forEach(el => el.classList.remove('active'));
				}
			});
		};

		async function loadData() {
			const refreshIcon = document.getElementById('refreshIcon');
			const updateTimeEl = document.getElementById('updateTime');
			const dashboardEl = document.getElementById('dashboard');

			if (refreshIcon) refreshIcon.classList.add('spinning');
			if (updateTimeEl) updateTimeEl.innerText = "불러오는 중...";
			if (dashboardEl) {
				dashboardEl.innerHTML = `
					<div class="loading-container">
						<i class="fa-solid fa-circle-notch fa-spin loading-spinner"></i>
						<p>실시간 시장 데이터를 불러오고 있습니다...</p>
					</div>`;
			}

			const controller = new AbortController();
			const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

			try {
				const response = await fetch(GAS_API_URL, { signal: controller.signal });
				clearTimeout(timeoutId);
				if (!response.ok) throw new Error(`서버 응답 오류 (HTTP ${response.status})`);
				const data = await response.json();
				if (!data || Object.keys(data).length === 0 || data.error) {
					throw new Error(data.message || "서버로부터 유효한 데이터를 수신하지 못했습니다.");
				}

				if (data.timestamp && updateTimeEl) {
					try {
						const parts = data.timestamp.split(' ');
						const dateParts = parts[0].split('-');
						const timeParts = parts[1].split(':');
						updateTimeEl.innerText = `${dateParts[1]}.${dateParts[2]} ${timeParts[0]}:${timeParts[1]} 기준`;
					} catch (e) { updateTimeEl.innerText = `${data.timestamp} 기준`; }
				}

				renderDashboard(data);
			} catch (error) {
				console.error("데이터 로딩 실패:", error);
				let errorMessage = error.name === 'AbortError' ? "서버 응답 시간이 초과되었습니다. (10초 경과)" : error.message;
				if (updateTimeEl) updateTimeEl.innerText = "수집 실패";
				showError(errorMessage);
			} finally {
				clearTimeout(timeoutId);
				if (refreshIcon) refreshIcon.classList.remove('spinning');
			}
		}

		function toggleTooltip(event, element) {
			event.preventDefault(); event.stopPropagation();
			const isActive = element.classList.contains('active');
			document.querySelectorAll('.tooltip-wrapper.active, .time-info.active').forEach(el => el.classList.remove('active'));
			if (!isActive) element.classList.add('active');
		}

		function showError(message) {
			document.getElementById('dashboard').innerHTML = `
				<div class="loading-container" style="color: #ef4444;">
					<i class="fa-solid fa-triangle-exclamation loading-spinner"></i>
					<p>데이터 수집 실패: ${message}</p>
					<button class="retry-btn" onclick="loadData()"><i class="fa-solid fa-rotate-right"></i> 다시 시도</button>
				</div>`;
		}

		function formatNumber(num, decimals = 2) {
			if (num === null || num === undefined || isNaN(num)) return "0.00";
			return Number(num).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
		}

		// ★ [에러 처리 추가] 개별 항목이 수집 실패(error: true)일 경우 '수집 오류' 배지 반환
		function getChangeBadgeHtml(change, isError = false) {
			if (isError) {
				return `<span class="change-badge" style="background:#ef444420; color:#ef4444; border:1px solid #ef444440; font-weight:700;"><i class="fa-solid fa-triangle-exclamation"></i> 수집 오류</span>`;
			}
			if (change === null || change === undefined) return "";
			let badgeClass = "bg-flat", iconClass = "fa-minus", prefix = "";
			if (change > 0.005) { badgeClass = "bg-up"; iconClass = "fa-caret-up"; prefix = "+"; }
			else if (change < -0.005) { badgeClass = "bg-down"; iconClass = "fa-caret-down"; }
			return `<span class="change-badge ${badgeClass}"><i class="fa-solid ${iconClass}"></i> ${prefix}${Number(change).toFixed(2)}%</span>`;
		}

		function getVixBadgeHtml(vixPrice, isError = false) {
			if (isError) return getChangeBadgeHtml(0, true);
			let color = "#10b981", label = "안정", icon = "fa-shield-halved";
			if (vixPrice >= 30) { color = "#ef4444"; label = "위험"; icon = "fa-triangle-exclamation"; }
			else if (vixPrice >= 20) { color = "#f59e0b"; label = "경계"; icon = "fa-circle-exclamation"; }
			return `<div style="display:flex; align-items:center; justify-content:flex-end;"><span class="change-badge" style="background:${color}20; color:${color}; border:1px solid ${color}40; font-weight:700;"><i class="fa-solid ${icon}"></i> ${label}</span></div>`;
		}

		function getSkewBadgeHtml(skewPrice, isError = false) {
			if (isError) return getChangeBadgeHtml(0, true);
			let color = "#10b981", label = "정상", icon = "fa-shield-halved";
			if (skewPrice >= 140) { color = "#ef4444"; label = "위험"; icon = "fa-triangle-exclamation"; }
			else if (skewPrice >= 130) { color = "#f59e0b"; label = "주의"; icon = "fa-circle-exclamation"; }
			return `<div style="display:flex; align-items:center; justify-content:flex-end;"><span class="change-badge" style="background:${color}20; color:${color}; border:1px solid ${color}40; font-weight:700;"><i class="fa-solid ${icon}"></i> ${label}</span></div>`;
		}

		function getMarketStatusBadgeHtml(fng, vix, skew) {
			if (fng?.error || vix?.error || skew?.error) return "";
			const fngVal = fng?.price || 50, vixVal = vix?.price || 0, skewVal = skew?.price || 0;
			let statusLabel = "장기투자 (평화)", color = "#10b981", icon = "fa-shield-halved", tooltip = "시장이 평화로우며 적립식 장기투자에 적합한 구간입니다.";
			if (skewVal >= 135 && vixVal >= 18) { statusLabel = "관망 (폭풍전야)"; color = "#ef4444"; icon = "fa-triangle-exclamation"; tooltip = "보호 옵션 비중이 높고 실제 변동성이 커지고 있습니다. 관망을 권장합니다."; }
			else if (skewVal >= 135 && vixVal < 18) { statusLabel = "위험 (현금확대)"; color = "#f97316"; icon = "fa-triangle-exclamation"; tooltip = "시장은 평화로워 보이나 기관의 하방 리스크 헤지(풋옵션)가 커진 상태입니다. 현금 비중 확대를 고려하세요."; }
			else if (vixVal >= 30 || (fngVal <= 25 && vixVal >= 25)) { statusLabel = "매수 기회 (공포)"; color = "#3b82f6"; icon = "fa-basket-shopping"; tooltip = "시장의 공포가 극에 달해 저점 분할 매수에 유리한 구간입니다."; }
			else if (fngVal >= 75) { statusLabel = "탐욕 (과열경계)"; color = "#f59e0b"; icon = "fa-fire"; tooltip = "시장 심리가 극도로 과열돼 있어 추격 매수에 주의가 필요합니다."; }
			return `<div class="tooltip-wrapper right-aligned" onclick="toggleTooltip(event, this)"><span class="change-badge" style="background:${color}20; color:${color}; border:1px solid ${color}40; font-weight:700; cursor:pointer; font-size:0.75rem;"><i class="fa-solid ${icon}"></i> ${statusLabel}</span><div class="custom-tooltip">${tooltip}</div></div>`;
		}

		function getBondStatusBadgeHtml(us02yt, tnx) {
			if (us02yt?.error || tnx?.error) return "";
			const y2 = us02yt?.price || 0, y10 = tnx?.price || 0;
			let statusLabel = "채권 보유 (중립)", color = "#38bdf8", icon = "fa-scale-balanced", tooltip = "국채 금리가 안정적인 범위 내에 있습니다.";
			if (y2 > 0 && y10 > 0 && y2 > y10) { statusLabel = "금리역전 (경기경계)"; color = "#a855f7"; icon = "fa-arrow-trend-down"; tooltip = "2년물 금리가 10년물보다 높은 장단기 금리 역전 상태입니다. 경기 침체 리스크에 유의하세요."; }
			else if (y10 >= 4.2) { statusLabel = "채권 매수 (고금리)"; color = "#10b981"; icon = "fa-cart-shopping"; tooltip = "국채 금리가 높은 수준입니다. 높은 이자 수익 및 향후 금리 하락 시 채권 가격 상승(차익)을 노리기 좋습니다."; }
			else if (y10 > 0 && y10 <= 3.5) { statusLabel = "채권 매도 (차익실현)"; color = "#ef4444"; icon = "fa-money-bill-transfer"; tooltip = "국채 금리가 낮아 채권 가격이 비싼 구간입니다. 이익 실현 또는 관망을 고려하세요."; }
			else if (tnx?.change >= 2.0) { statusLabel = "채권 관망 (금리상승)"; color = "#f59e0b"; icon = "fa-hand"; tooltip = "금리가 상승 중입니다. 채권 가격이 추가 하락할 수 있으므로 분할 접근이 필요합니다."; }
			return `<div class="tooltip-wrapper right-aligned" onclick="toggleTooltip(event, this)"><span class="change-badge" style="background:${color}20; color:${color}; border:1px solid ${color}40; font-weight:700; cursor:pointer; font-size:0.75rem;"><i class="fa-solid ${icon}"></i> ${statusLabel}</span><div class="custom-tooltip">${tooltip}</div></div>`;
		}

		function renderDashboard(data) {
			let fngText = "Neutral", fngIcon = "fa-face-meh", fngColor = "#eab308";
			if (data.fng.price <= 24) { fngIcon = "fa-face-flushed"; fngText = "Extreme Fear"; fngColor = "#ef4444"; }
			else if (data.fng.price <= 44) { fngIcon = "fa-face-frown"; fngText = "Fear"; fngColor = "#f97316"; }
			else if (data.fng.price <= 55) { fngIcon = "fa-face-meh"; fngText = "Neutral"; fngColor = "#eab308"; }
			else if (data.fng.price <= 74) { fngIcon = "fa-face-smile"; fngText = "Greed"; fngColor = "#84cc16"; }
			else { fngIcon = "fa-rocket"; fngText = "Extreme Greed"; fngColor = "#10b981"; }

			const fngBadgeHtml = data.fng.error
				? `<span class="change-badge" style="background:#ef444420; color:#ef4444; border:1px solid #ef444440; font-weight:700;"><i class="fa-solid fa-triangle-exclamation"></i> 수집 오류</span>`
				: `<span class="change-badge" style="background:${fngColor}20; color:${fngColor}; border:1px solid ${fngColor}40; font-weight:700;"><i class="fa-regular ${fngIcon}"></i> ${fngText}</span>`;

			const overallStatusBadge = getMarketStatusBadgeHtml(data.fng, data.vix, data.skew);
			const bondStatusBadge = getBondStatusBadgeHtml(data.us02yt, data.tnx);

			const sections = [
				{
					title: "시장 심리 & 변동성", icon: "fa-heart-pulse", headerExtra: overallStatusBadge,
					items: [
						{ name: "Fear & Greed", sub: "CNN 공포탐욕 지수", price: data.fng.error ? "-" : `${data.fng.price}`, changeHtml: fngBadgeHtml, icon: `fa-regular ${fngIcon}`, url: data.fng.url, tooltip: "CNN 투자자 심리 지수 (0~100)\n• 0~24: 극심한 공포\n• 25~44: 공포\n• 45~55: 중립\n• 56~74: 탐욕\n• 75~100: 극심한 탐욕" },
						{ name: "VIX 변동성", sub: "CBOE 변동성 지수", price: data.vix.error ? "-" : formatNumber(data.vix.price), changeHtml: getVixBadgeHtml(data.vix.price, data.vix.error), icon: "fa-solid fa-bolt", url: data.vix.url, tooltip: "시장 변동성 지수\n• 20 미만: 안정\n• 20~30: 경계\n• 30 이상: 위험" },
						{ name: "SKEW 지수", sub: "블랙스완 위험 지수", price: data.skew.error ? "-" : formatNumber(data.skew.price), changeHtml: getSkewBadgeHtml(data.skew.price, data.skew.error), icon: "fa-solid fa-fish-fins", url: data.skew.url, tooltip: "블랙스완(폭락) 위험 지수\n• 120 미만: 정상\n• 120~135: 주의\n• 135 이상: 위험" }
					]
				},
				{
					title: "미국 대표 지수", icon: "fa-chart-column", headerExtra: "",
					items: [
						{ name: "S&P 500", sub: "^GSPC", price: data.spx.error ? "-" : formatNumber(data.spx.price), changeHtml: getChangeBadgeHtml(data.spx.change, data.spx.error), icon: "fa-solid fa-flag-usa", url: data.spx.url },
						{ name: "NASDAQ", sub: "^IXIC", price: data.ixic.error ? "-" : formatNumber(data.ixic.price), changeHtml: getChangeBadgeHtml(data.ixic.change, data.ixic.error), icon: "fa-solid fa-microchip", url: data.ixic.url },
						{ name: "필라델피아 반도체", sub: "^SOX", price: data.sox.error ? "-" : formatNumber(data.sox.price), changeHtml: getChangeBadgeHtml(data.sox.change, data.sox.error), icon: "fa-solid fa-memory", url: data.sox.url }
					]
				},
				{
					title: "미국 3대 지수 선물", icon: "fa-arrow-trend-up", headerExtra: "",
					items: [
						{ name: "S&P 500 선물", sub: "ES=F", price: data.es_f.error ? "-" : formatNumber(data.es_f.price), changeHtml: getChangeBadgeHtml(data.es_f.change, data.es_f.error), icon: "fa-solid fa-chart-pie", url: data.es_f.url },
						{ name: "나스닥 100 선물", sub: "NQ=F", price: data.nq_f.error ? "-" : formatNumber(data.nq_f.price), changeHtml: getChangeBadgeHtml(data.nq_f.change, data.nq_f.error), icon: "fa-solid fa-laptop-code", url: data.nq_f.url },
						{ name: "다우존스 선물", sub: "YM=F", price: data.ym_f.error ? "-" : formatNumber(data.ym_f.price), changeHtml: getChangeBadgeHtml(data.ym_f.change, data.ym_f.error), icon: "fa-solid fa-building", url: data.ym_f.url }
					]
				},
				{
					title: "주요 글로벌 환율", icon: "fa-coins", headerExtra: "",
					items: [
						{ name: "달러 / 원", sub: "USD/KRW", price: data.usdkrw.error ? "-" : `${formatNumber(data.usdkrw.price)} 원`, changeHtml: getChangeBadgeHtml(data.usdkrw.change, data.usdkrw.error), icon: "fa-solid fa-dollar-sign", url: data.usdkrw.url },
						{ name: "엔 / 원", sub: "JPY/KRW (100엔)", price: data.jpykrw.error ? "-" : `${formatNumber(data.jpykrw.price)} 원`, changeHtml: getChangeBadgeHtml(data.jpykrw.change, data.jpykrw.error), icon: "fa-solid fa-yen-sign", url: data.jpykrw.url },
						{ name: "달러 / 엔", sub: "USD/JPY", price: data.usdjpy.error ? "-" : `${formatNumber(data.usdjpy.price)} 엔`, changeHtml: getChangeBadgeHtml(data.usdjpy.change, data.usdjpy.error), icon: "fa-solid fa-arrow-right-arrow-left", url: data.usdjpy.url }
					]
				},
				{
					title: "원자재 & 암호화폐", icon: "fa-gem", headerExtra: "",
					items: [
						{ name: "WTI 원유 선물", sub: "CL=F", price: data.oil.error ? "-" : `$${formatNumber(data.oil.price)}`, changeHtml: getChangeBadgeHtml(data.oil.change, data.oil.error), icon: "fa-solid fa-oil-well", url: data.oil.url },
						{ name: "비트코인", sub: "BTC/USD", price: data.btc.error ? "-" : `$${formatNumber(data.btc.price, 0)}`, changeHtml: getChangeBadgeHtml(data.btc.change, data.btc.error), icon: "fa-brands fa-btc", url: data.btc.url },
						{ name: "이더리움", sub: "ETH/USD", price: data.eth.error ? "-" : `$${formatNumber(data.eth.price, 0)}`, changeHtml: getChangeBadgeHtml(data.eth.change, data.eth.error), icon: "fa-brands fa-ethereum", url: data.eth.url }
					]
				},
				{
					title: "미국 국채 금리", icon: "fa-building-columns", headerExtra: bondStatusBadge,
					items: [
						{ name: "2년물 국채", sub: "2YY=F (단기)", price: data.us02yt.error ? "-" : `${Number(data.us02yt.price).toFixed(3)}%`, changeHtml: getChangeBadgeHtml(data.us02yt.change, data.us02yt.error), icon: "fa-solid fa-clock-rotate-left", url: data.us02yt.url },
						{ name: "10년물 국채", sub: "^TNX (중장기)", price: data.tnx.error ? "-" : `${Number(data.tnx.price).toFixed(3)}%`, changeHtml: getChangeBadgeHtml(data.tnx.change, data.tnx.error), icon: "fa-solid fa-landmark", url: data.tnx.url },
						{ name: "30년물 국채", sub: "^TYX (초장기)", price: data.tyx.error ? "-" : `${Number(data.tyx.price).toFixed(3)}%`, changeHtml: getChangeBadgeHtml(data.tyx.change, data.tyx.error), icon: "fa-solid fa-vault", url: data.tyx.url }
					]
				}
			];

			let html = "";
			sections.forEach(sec => {
				html += `<div class="card"><div class="card-header"><div class="card-header-left"><i class="fa-solid ${sec.icon}"></i><span class="card-title">${sec.title}</span></div>${sec.headerExtra || ''}</div><div class="item-list">`;
				sec.items.forEach(item => {
					const tooltipHtml = item.tooltip ? `<div class="tooltip-wrapper" onclick="toggleTooltip(event, this)"><i class="fa-regular fa-circle-question tooltip-btn"></i><div class="custom-tooltip">${item.tooltip}</div></div>` : '';
					html += `<a href="${item.url}" target="_blank" rel="noopener noreferrer" class="item-link" title="${item.name} 상세 차트 열기"><div class="item"><div class="item-left"><div class="icon-badge"><i class="${item.icon}"></i></div><div><span class="item-name">${item.name} ${tooltipHtml}<i class="fa-solid fa-arrow-up-right-from-square external-icon"></i></span><span class="item-sub">${item.sub}</span></div></div><div class="item-right"><span class="price">${item.price}</span>${item.changeHtml}</div></div></a>`;
				});
				html += `</div></div>`;
			});
